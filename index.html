<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Clone (OpenRouter Stream)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

    <style>
        /* Custom scrollbar configurations */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        /* Custom animation for thinking state */
        .dot-pulse {
            animation: pulse 1.4s infinite ease-in-out both;
        }
        .dot-pulse:nth-child(1) { animation-delay: -0.32s; }
        .dot-pulse:nth-child(2) { animation-delay: -0.16s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        /* Markdown Style Overrides */
        .prose pre {
            background-color: #1e1e1e !important;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 0.75rem 0;
            overflow-x: auto;
            position: relative;
        }
        .prose code {
            font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', monospace;
            font-size: 0.9em;
        }
        .prose p {
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }
        .prose ul, .prose ol {
            margin-left: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-800 dark:bg-zinc-900 dark:text-zinc-100 transition-colors duration-200 antialiased font-sans">

    <div class="flex h-full w-full overflow-hidden relative">

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-zinc-950 border-r border-slate-200 dark:border-zinc-800 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            
            <div class="p-4 border-b border-slate-200 dark:border-zinc-800 flex items-center justify-between">
                <button onclick="createNewChat()" class="flex-1 flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 dark:bg-zinc-900 dark:hover:bg-zinc-800 text-slate-700 dark:text-zinc-200 font-medium py-2.5 px-4 rounded-xl transition-all duration-200 active:scale-98">
                    <i class="fa-solid fa-plus text-xs"></i>
                    <span>New Chat</span>
                </button>
                <button onclick="toggleSidebar()" class="md:hidden ml-2 p-2.5 text-slate-500 hover:bg-slate-100 dark:hover:bg-zinc-900 rounded-xl">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div id="chats-container" class="flex-1 overflow-y-auto p-3 space-y-1">
                </div>

            <div class="p-4 border-t border-slate-200 dark:border-zinc-800 flex items-center justify-between gap-2">
                <button onclick="toggleTheme()" class="flex-1 flex items-center justify-center gap-2 py-2 px-3 text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-900 rounded-xl transition-colors">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                    <span id="theme-text" class="text-sm font-medium">Dark Mode</span>
                </button>
                <button onclick="openSettings()" class="p-2.5 text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-900 rounded-xl transition-colors" title="Settings">
                    <i class="fa-solid fa-gear text-lg"></i>
                </button>
            </div>
        </aside>

        <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 z-30 bg-black/40 backdrop-blur-sm hidden md:hidden"></div>

        <main class="flex-1 flex flex-col h-full min-w-0 md:ml-0 relative">
            
            <header class="h-16 border-b border-slate-200 dark:border-zinc-800 bg-white/80 dark:bg-zinc-950/80 backdrop-blur flex items-center justify-between px-4 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="p-2 text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-900 rounded-xl md:hidden">
                        <i class="fa-solid fa-bars text-lg"></i>
                    </button>
                    <div class="flex items-center gap-2">
                        <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-600 to-violet-600 dark:from-blue-400 dark:to-violet-400 bg-clip-text text-transparent">Gemini</span>
                        <span id="active-model-badge" class="text-xs font-mono px-2 py-0.5 rounded-md bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-zinc-400 truncate max-w-[140px] sm:max-w-[240px]"></span>
                    </div>
                </div>
                <div id="clear-history-container">
                    </div>
            </header>

            <div id="messages-viewport" class="flex-1 overflow-y-auto px-4 py-6 md:px-8 space-y-6">
                </div>

            <div class="p-4 md:p-6 bg-gradient-to-t from-slate-50 via-slate-50/95 to-transparent dark:from-zinc-900 dark:via-zinc-900/95">
                <div class="max-w-3xl mx-auto relative">
                    
                    <div class="bg-white dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 rounded-2xl shadow-sm focus-within:border-blue-500 dark:focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-500/10 dark:focus-within:ring-blue-400/10 transition-all duration-200">
                        <textarea id="user-input" 
                            rows="1" 
                            placeholder="Message Gemini..." 
                            class="w-full pl-4 pr-14 py-3.5 bg-transparent resize-none border-none outline-none focus:ring-0 text-slate-800 dark:text-zinc-100 max-h-48 font-normal leading-relaxed text-base"
                            oninput="autoGrowInput(this)"
                            onkeydown="handleInputKeydown(event)"></textarea>
                        
                        <div class="absolute right-3 bottom-3 flex items-center gap-2">
                            <button id="stop-generation-btn" onclick="abortStreamGeneration()" class="hidden p-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl transition-colors shadow-sm" title="Stop Generation">
                                <i class="fa-solid fa-square text-sm"></i>
                            </button>
                            <button id="send-btn" onclick="submitUserQuery()" class="p-2 bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white rounded-xl transition-colors shadow-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                                <i class="fa-solid fa-paper-plane text-sm"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-center text-xs text-slate-400 dark:text-zinc-500 mt-2 font-normal">
                        Gemini may display inaccurate info, so double-check its responses. Powered via OpenRouter API.
                    </p>
                </div>
            </div>
        </main>

        <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden transition-opacity duration-200">
            <div class="bg-white dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800 w-full max-w-lg rounded-2xl shadow-xl flex flex-col max-h-[90vh] overflow-hidden transform scale-95 transition-transform duration-200">
                
                <div class="p-4 border-b border-slate-200 dark:border-zinc-800 flex items-center justify-between">
                    <h3 class="text-lg font-bold text-slate-800 dark:text-zinc-100">Engine Configuration Settings</h3>
                    <button onclick="closeSettings()" class="p-1.5 text-slate-400 hover:bg-slate-100 dark:hover:bg-zinc-900 rounded-lg transition-colors">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <div class="p-6 overflow-y-auto space-y-5">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-zinc-400 mb-1.5">OpenRouter API Key</label>
                        <div class="relative">
                            <input id="settings-api-key" type="password" placeholder="sk-or-..." class="w-full pl-3 pr-10 py-2 bg-slate-50 dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 dark:focus:border-blue-400 dark:focus:ring-blue-400 outline-none font-mono text-sm">
                            <button type="button" onclick="togglePasswordVisibility('settings-api-key', this)" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-slate-400 hover:text-slate-600 dark:hover:text-zinc-300">
                                <i class="fa-solid fa-eye text-sm"></i>
                            </button>
                        </div>
                        <p class="text-xs text-slate-400 dark:text-zinc-500 mt-1">Credentials remain secure inside your client device sandbox LocalStorage container safely.</p>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-zinc-400 mb-1.5">Model Identifier Routing Endpoint</label>
                        <input id="settings-model" type="text" placeholder="e.g., deepseek/deepseek-r1:free" class="w-full px-3 py-2 bg-slate-50 dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 dark:focus:border-blue-400 dark:focus:ring-blue-400 outline-none font-mono text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-zinc-400 mb-1.5">Global System Prompt / AI Persona</label>
                        <textarea id="settings-system-prompt" rows="4" placeholder="You are a helpful assistant..." class="w-full px-3 py-2 bg-slate-50 dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 dark:focus:border-blue-400 dark:focus:ring-blue-400 outline-none text-sm resize-none"></textarea>
                    </div>
                </div>

                <div class="p-4 border-t border-slate-200 dark:border-zinc-800 flex justify-end gap-3 bg-slate-50/50 dark:bg-zinc-950/50">
                    <button onclick="closeSettings()" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-900 rounded-xl transition-colors">Cancel</button>
                    <button onclick="saveSettingsConfig()" class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white rounded-xl transition-colors shadow-sm">Save Configuration</button>
                </div>

            </div>
        </div>

        <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

    </div>

    <script>
        // State Machine Management Storage Dictionary Node Objects definitions
        let appState = {
            apiKey: "",
            modelName: "deepseek/deepseek-r1:free",
            globalSystemPrompt: "You are Gemini, a sophisticated, large language model trained by Google. Respond in rich Markdown format with helpful, crisp answers.",
            chats: [],
            activeChatId: null,
            theme: "light"
        };

        // Active Stream Engine Synchronization Signal Controls Architecture Nodes
        let streamAbortController = null;
        const DEFAULT_MODEL = "deepseek/deepseek-r1:free";

        // Application Execution Context Entry Setup Init Initialization Loop Hook
        window.addEventListener('DOMContentLoaded', () => {
            initializeApplicationConfiguration();
            configureInputStateValidations();
        });

        /**
         * Pulls local browser storage settings and initializes UI contexts state loops securely.
         */
        function initializeApplicationConfiguration() {
            try {
                appState.apiKey = localStorage.getItem("gemini_clone_api_key") || "";
                appState.modelName = localStorage.getItem("gemini_clone_model") || DEFAULT_MODEL;
                appState.globalSystemPrompt = localStorage.getItem("gemini_clone_system") || appState.globalSystemPrompt;
                appState.theme = localStorage.getItem("gemini_clone_theme") || "light";
                
                const loadedChats = localStorage.getItem("gemini_clone_chats");
                if (loadedChats) {
                    appState.chats = JSON.parse(loadedChats);
                }
            } catch (storageError) {
                renderSystemToastAlert("Failed parsing local configurations storage. Resetting maps cleanly.", "error");
                appState.chats = [];
            }

            // Enforce explicit visual active theme preference application state changes
            applyEnforcedThemeState(appState.theme);

            // Active chat structures verification engine arrays loop
            if (appState.chats.length === 0) {
                createNewChat();
            } else {
                appState.activeChatId = appState.chats[0].id;
                renderSidebarChatListSelectionView();
                renderSelectedChatThreadViewport();
            }

            // Sync visual environment system badges configuration texts values setup
            updateApplicationStatusBadges();
        }

        /**
         * Commit state properties parameters configuration strings into storage vectors
         */
        function synchronizeStateToLocalStorage() {
            try {
                localStorage.setItem("gemini_clone_api_key", appState.apiKey);
                localStorage.setItem("gemini_clone_model", appState.modelName);
                localStorage.setItem("gemini_clone_system", appState.globalSystemPrompt);
                localStorage.setItem("gemini_clone_chats", JSON.stringify(appState.chats));
                localStorage.setItem("gemini_clone_theme", appState.theme);
            } catch (persistenceFault) {
                renderSystemToastAlert("Security layer fault while storing configuration parameters updates.", "warn");
            }
        }

        function updateApplicationStatusBadges() {
            const badge = document.getElementById('active-model-badge');
            badge.innerText = appState.modelName;
            badge.title = `Model: ${appState.modelName}`;
        }

        /**
         * Architecture Framework Context Engine: Chat Management Systems Mutation Handlers
         */
        function createNewChat() {
            const generatedChatId = "chat_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
            const freshChatNode = {
                id: generatedChatId,
                title: "Untitled Conversation",
                systemPromptOverride: appState.globalSystemPrompt,
                messages: []
            };

            appState.chats.unshift(freshChatNode);
            appState.activeChatId = generatedChatId;

            synchronizeStateToLocalStorage();
            renderSidebarChatListSelectionView();
            renderSelectedChatThreadViewport();
            
            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        }

        function selectChatSession(targetChatId) {
            if (appState.activeChatId === targetChatId) return;
            
            // Abort active generators if context transitions dynamically mid-stream
            if (streamAbortController) {
                abortStreamGeneration();
            }

            appState.activeChatId = targetChatId;
            renderSidebarChatListSelectionView();
            renderSelectedChatThreadViewport();

            if (window.innerWidth < 768) {
                toggleSidebar();
            }
        }

        function triggerInlineChatRename(targetChatId, event) {
            event.stopPropagation();
            const matchingChat = appState.chats.find(c => c.id === targetChatId);
            if (!matchingChat) return;

            const targetNewTitleString = prompt("Enter a replacement title descriptor text node parameter for this conversation thread:", matchingChat.title);
            if (targetNewTitleString === null) return;
            
            const sanitizedTitle = targetNewTitleString.trim();
            matchingChat.title = sanitizedTitle !== "" ? sanitizedTitle : "Untitled Conversation";

            synchronizeStateToLocalStorage();
            renderSidebarChatListSelectionView();
        }

        function deleteChatSession(targetChatId, event) {
            event.stopPropagation();
            
            // Confirm deletion
            if (!confirm("Are you sure you want to permanently delete this conversation thread?")) return;

            const targetedIndexLocation = appState.chats.findIndex(c => c.id === targetChatId);
            if (targetedIndexLocation === -1) return;

            if (appState.activeChatId === targetChatId && streamAbortController) {
                abortStreamGeneration();
            }

            appState.chats.splice(targetedIndexLocation, 1);

            if (appState.chats.length === 0) {
                createNewChat();
                return;
            }

            if (appState.activeChatId === targetChatId) {
                appState.activeChatId = appState.chats[0].id;
            }

            synchronizeStateToLocalStorage();
            renderSidebarChatListSelectionView();
            renderSelectedChatThreadViewport();
        }

        /**
         * Component Rendering Pipelines Management Engine
         */
        function renderSidebarChatListSelectionView() {
            const container = document.getElementById("chats-container");
            container.innerHTML = "";

            appState.chats.forEach(chatNode => {
                const isActive = chatNode.id === appState.activeChatId;
                
                const chatListItem = document.createElement("div");
                chatListItem.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all duration-150 ${
                    isActive 
                    ? 'bg-blue-50/80 text-blue-700 dark:bg-blue-950/40 dark:text-blue-400 font-medium' 
                    : 'text-slate-600 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-900/60'
                }`;
                chatListItem.onclick = () => selectChatSession(chatNode.id);

                chatListItem.innerHTML = `
                    <div class="flex items-center gap-2.5 min-w-0 flex-1">
                        <i class="fa-regular fa-comment text-sm flex-shrink-0 opacity-70"></i>
                        <span class="text-sm truncate pr-2">${escapeHtmlEntities(chatNode.title)}</span>
                    </div>
                    <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                        <button onclick="triggerInlineChatRename('${chatNode.id}', event)" class="p-1 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" title="Rename Conversation">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button onclick="deleteChatSession('${chatNode.id}', event)" class="p-1 hover:text-rose-600 dark:hover:text-rose-400 transition-colors" title="Delete Conversation">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>
                `;
                container.appendChild(chatListItem);
            });
        }

        function renderSelectedChatThreadViewport() {
            const viewport = document.getElementById("messages-viewport");
            viewport.innerHTML = "";

            const targetActiveConversation = appState.chats.find(c => c.id === appState.activeChatId);
            if (!targetActiveConversation || targetActiveConversation.messages.length === 0) {
                // Populate high fidelity welcoming aesthetic frame layout inside viewport
                viewport.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-center max-w-lg mx-auto py-12 px-4 select-none">
                        <div class="w-16 h-16 bg-gradient-to-tr from-blue-500 to-violet-500 rounded-2xl flex items-center justify-center shadow-md shadow-blue-500/10 mb-6">
                            <i class="fa-solid fa-sparkles text-white text-2xl animate-pulse"></i>
                        </div>
                        <h2 class="text-2xl font-bold tracking-tight text-slate-800 dark:text-zinc-100 mb-2">Supercharge your creativity</h2>
                        <p class="text-slate-500 dark:text-zinc-400 text-sm leading-relaxed">
                            Ask questions, build software modules, translate texts assets, or optimize architecture concepts using low-latency artificial intelligence streaming engines safely.
                        </p>
                    </div>
                `;
                return;
            }

            // Iterate over existing history and generate operational components
            targetActiveConversation.messages.forEach(msgNode => {
                if (msgNode.role === 'system') return; // Hide standard payload architecture system entries from view UI
                appendMessageBubbleNodeToViewport(msgNode.role, msgNode.content, false);
            });

            scrollToAbsoluteViewportBottom();
        }

        /**
         * Construct, structuralize, and attach target components parameters onto view elements trees
         */
        function appendMessageBubbleNodeToViewport(role, initialContent = "", isStreamingNode = false) {
            const viewport = document.getElementById("messages-viewport");
            
            // Wipe initialization landing layout vectors clean if structural updates arrive
            if (viewport.querySelector('.select-none')) {
                viewport.innerHTML = "";
            }

            const wrapperId = isStreamingNode ? "active-streaming-node-wrapper" : `msg_${Date.now()}_${Math.floor(Math.random()*1000)}`;
            const isUser = role === "user";

            const rowContainer = document.createElement("div");
            rowContainer.id = wrapperId;
            rowContainer.className = `flex w-full items-start gap-4 ${isUser ? 'justify-end' : 'justify-start'}`;

            let bubbleContentHTML = "";

            if (isUser) {
                bubbleContentHTML = `
                    <div class="max-w-[85%] md:max-w-[75%] bg-blue-600 text-white dark:bg-blue-600 px-4 py-2.5 rounded-2xl rounded-tr-sm shadow-sm text-base font-normal whitespace-pre-wrap leading-relaxed">
                        ${escapeHtmlEntities(initialContent)}
                    </div>
                `;
            } else {
                bubbleContentHTML = `
                    <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-violet-600 flex items-center justify-center text-white shadow-sm mt-0.5">
                        <i class="fa-solid fa-robot text-xs"></i>
                    </div>
                    <div class="max-w-[85%] md:max-w-[80%] flex flex-col space-y-1">
                        <span class="text-xs font-semibold text-slate-400 dark:text-zinc-500 uppercase tracking-wider pl-1">Gemini AI</span>
                        <div class="prose dark:prose-invert max-w-none bg-white dark:bg-zinc-950 border border-slate-200 dark:border-zinc-800/80 px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm text-slate-800 dark:text-zinc-100 text-base font-normal min-w-[60px]">
                            <div class="msg-markdown-payload-container">${isStreamingNode && !initialContent ? createPulsingThinkingLoaderHTML() : formatMarkdownContentPayload(initialContent)}</div>
                        </div>
                    </div>
                `;
            }

            rowContainer.innerHTML = bubbleContentHTML;
            viewport.appendChild(rowContainer);
            
            if (!isStreamingNode) {
                bindCodeBlockUtilityHeaders(rowContainer);
            }
            
            scrollToAbsoluteViewportBottom();
            return rowContainer;
        }

        function createPulsingThinkingLoaderHTML() {
            return `
                <div class="flex items-center gap-1.5 py-2 px-1">
                    <span class="w-2.5 h-2.5 bg-slate-400 dark:bg-zinc-500 rounded-full dot-pulse"></span>
                    <span class="w-2.5 h-2.5 bg-slate-400 dark:bg-zinc-500 rounded-full dot-pulse"></span>
                    <span class="w-2.5 h-2.5 bg-slate-400 dark:bg-zinc-500 rounded-full dot-pulse"></span>
                </div>
            `;
        }

        /**
         * Core Integration Pipeline Engine Layer: Streaming Network Framework Connectors
         */
        async function submitUserQuery() {
            const inputField = document.getElementById("user-input");
            const rawUserQueryString = inputField.value;
            if (!rawUserQueryString.trim()) return;

            if (!appState.apiKey) {
                renderSystemToastAlert("Missing OpenRouter API Key credentials token. Please configure via settings panel.", "error");
                openSettings();
                return;
            }

            // Lock submission pipelines safely 
            setInputProcessingActiveState(true);

            // Fetch target parent dataset entity container mappings
            const activeChatNode = appState.chats.find(c => c.id === appState.activeChatId);
            if (!activeChatNode) {
                setInputProcessingActiveState(false);
                return;
            }

            // Commit user telemetry text structures locally
            activeChatNode.messages.push({
                role: "user",
                content: rawUserQueryString
            });

            // If this is the initial user payload contribution, update the summary chat title identifier string
            if (activeChatNode.title === "Untitled Conversation") {
                activeChatNode.title = rawUserQueryString.trim().substring(0, 26) + (rawUserQueryString.length > 26 ? "..." : "");
                renderSidebarChatListSelectionView();
            }

            // Append user text elements node block to UI viewport container
            appendMessageBubbleNodeToViewport("user", rawUserQueryString, false);
            
            // Clean up text areas and recalibrate grow matrices context positions
            inputField.value = "";
            autoGrowInput(inputField);

            // Render active tracking streaming node structure safely
            const streamingBubbleNodeRow = appendMessageBubbleNodeToViewport("assistant", "", true);
            const markdownPayloadTargetContainer = streamingBubbleNodeRow.querySelector(".msg-markdown-payload-container");

            // Setup system execution network streams pipelines
            streamAbortController = new AbortController();
            let accumulatedAIResponseTokens = "";

            try {
                // Initialize modern streaming fetch context request parameters structures mappings
                const parsedFetchTargetPayloadMessages = [];
                
                // Mount system instruction block context safely at structural indices 
                if (activeChatNode.systemPromptOverride && activeChatNode.systemPromptOverride.trim() !== "") {
                    parsedFetchTargetPayloadMessages.push({
                        role: "system",
                        content: activeChatNode.systemPromptOverride
                    });
                }
                
                // Add message histories arrays data parameters
                activeChatNode.messages.forEach(m => {
                    parsedFetchTargetPayloadMessages.push({ role: m.role, content: m.content });
                });

                const networkFetchResponseConnection = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${appState.apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.origin,
                        "X-Title": "Gemini Web Client Sandbox"
                    },
                    body: JSON.stringify({
                        model: appState.modelName,
                        messages: parsedFetchTargetPayloadMessages,
                        stream: true
                    }),
                    signal: streamAbortController.signal
                });

                if (!networkFetchResponseConnection.ok) {
                    const serverErrorTextDump = await networkFetchResponseConnection.text();
                    throw new Error(`HTTP_${networkFetchResponseConnection.status} - ${serverErrorTextDump || 'Unknown Platform Error Gateway Exception'}`);
                }

                // Process readable network body streams chunk structures loop
                const clientStreamTextDecoder = new TextDecoder("utf-8");
                const ioStreamReader = networkFetchResponseConnection.body.getReader();
                
                let residualChunkBufferString = "";

                while (true) {
                    const { done, value } = await ioStreamReader.read();
                    if (done) break;

                    // Concatenate incoming bit-chunks securely transformed into text telemetry
                    residualChunkBufferString += clientStreamTextDecoder.decode(value, { stream: true });
                    
                    // Split content structures along lines parameters
                    const sequenceLines = residualChunkBufferString.split("\n");
                    // Keep the final un-terminated fragment inside buffer safely
                    residualChunkBufferString = sequenceLines.pop();

                    for (const activeLine of sequenceLines) {
                        const trimmedLineContent = activeLine.trim();
                        if (!trimmedLineContent) continue;
                        if (!trimmedLineContent.startsWith("data: ")) continue;

                        const rawSSEPayloadJSONString = trimmedLineContent.substring(6).trim();
                        if (rawSSEPayloadJSONString === "[DONE]") break;

                        try {
                            const atomicTokenResponseJSONMap = JSON.parse(rawSSEPayloadJSONString);
                            const responseTokenChunkContent = atomicTokenResponseJSONMap.choices?.[0]?.delta?.content || "";
                            
                            if (responseTokenChunkContent) {
                                accumulatedAIResponseTokens += responseTokenChunkContent;
                                // Bind dynamic continuous engine payload renders directly to target frame layouts
                                markdownPayloadTargetContainer.innerHTML = formatMarkdownContentPayload(accumulatedAIResponseTokens);
                                scrollToAbsoluteViewportBottom();
                            }
                        } catch (innerJsonParseFault) {
                            // Suppress partial fragment data interpretation interruptions logs safely
                            continue;
                        }
                    }
                }

                // Process terminal remaining bits parameters inside chunk buffer tracking structures safely
                if (residualChunkBufferString && residualChunkBufferString.startsWith("data: ")) {
                     const functionalTrailingJSONString = residualChunkBufferString.substring(6).trim();
                     if (functionalTrailingJSONString !== "[DONE]") {
                         try {
                            const trailingTokenResponseMap = JSON.parse(functionalTrailingJSONString);
                            const finalTrailingTokenContent = trailingTokenResponseMap.choices?.[0]?.delta?.content || "";
                            if (finalTrailingTokenContent) {
                                accumulatedAIResponseTokens += finalTrailingTokenContent;
                                markdownPayloadTargetContainer.innerHTML = formatMarkdownContentPayload(accumulatedAIResponseTokens);
                            }
                         } catch (e) {}
                     }
                }

                // Ensure the animation transitions clean to full rendering frame blocks components mapping layouts arrays definitions
                if (!accumulatedAIResponseTokens) {
                    markdownPayloadTargetContainer.innerHTML = "<p class='text-slate-400 italic text-sm'>Conversation context ended without text tokens response returned from model pipeline parameters.</p>";
                } else {
                    // Commit final assembled payload content properties variables directly onto chat histories models maps layers
                    activeChatNode.messages.push({
                        role: "assistant",
                        content: accumulatedAIResponseTokens
                    });
                    synchronizeStateToLocalStorage();
                    
                    // Re-bind functional syntax controllers elements explicitly over compiled structures context elements blocks containers
                    bindCodeBlockUtilityHeaders(streamingBubbleNodeRow);
                }

            } catch (networkExecutionExceptionError) {
                // Intercept intentional client connection signal termination sequences parameters cleanly
                if (networkExecutionExceptionError.name === 'AbortError') {
                    renderSystemToastAlert("Stream generation killed by agent request signal context command.", "info");
                    
                    if (accumulatedAIResponseTokens.trim() !== "") {
                        activeChatNode.messages.push({
                            role: "assistant",
                            content: accumulatedAIResponseTokens + " *[Generation Halted]*"
                        });
                        synchronizeStateToLocalStorage();
                    }
                } else {
                    // Process external platform layer crash assertions, code error states mappings arrays maps logs configurations
                    const contextualErrorMessageString = networkExecutionExceptionError.message || "Unhandled Gateway Stream Infrastructure Communication Error Exception Connection Reset Fault.";
                    renderSystemToastAlert(contextualErrorMessageString, "error");
                    
                    // Render interactive custom diagnostic component error bubble parameters elements blocks securely
                    if (!accumulatedAIResponseTokens) {
                        markdownPayloadTargetContainer.innerHTML = `
                            <div class="flex items-center gap-3 p-3 text-rose-700 bg-rose-50 border border-rose-200 dark:bg-rose-950/30 dark:border-rose-900/50 dark:text-rose-400 rounded-xl text-sm">
                                <i class="fa-solid fa-triangle-exclamation text-base flex-shrink-0"></i>
                                <div>
                                    <span class="font-bold block">Execution Request Transmission Fault Exception</span>
                                    <span class="font-mono text-xs opacity-90">${escapeHtmlEntities(contextualErrorMessageString)}</span>
                                </div>
                            </div>
                        `;
                    }
                }
            } finally {
                // Clear and reset operational control hooks indicators mappings contexts variables parameters
                streamAbortController = null;
                streamingBubbleNodeRow.id = ""; // Unset transient execution tracking template variables identifiers labels from memory maps
                setInputProcessingActiveState(false);
                scrollToAbsoluteViewportBottom();
            }
        }

        function abortStreamGeneration() {
            if (streamAbortController) {
                streamAbortController.abort();
            }
        }

        /**
         * Dynamic State Interface UI Control Mutators Utilities Engine
         */
        function setInputProcessingActiveState(isProcessing) {
            const inputField = document.getElementById("user-input");
            const sendButton = document.getElementById("send-btn");
            const stopButton = document.getElementById("stop-generation-btn");

            if (isProcessing) {
                inputField.setAttribute("disabled", "true");
                sendButton.setAttribute("disabled", "true");
                sendButton.classList.add("hidden");
                stopButton.classList.remove("hidden");
            } else {
                inputField.removeAttribute("disabled");
                stopButton.classList.add("hidden");
                sendButton.classList.remove("hidden");
                configureInputStateValidations();
                inputField.focus();
            }
        }

        function configureInputStateValidations() {
            const inputField = document.getElementById("user-input");
            const sendButton = document.getElementById("send-btn");
            
            const evaluateInputContentValidationState = () => {
                if (inputField.value.trim().length > 0) {
                    sendButton.removeAttribute("disabled");
                } else {
                    sendButton.setAttribute("disabled", "true");
                }
            };

            inputField.addEventListener("input", evaluateInputContentValidationState);
            evaluateInputContentValidationState();
        }

        function autoGrowInput(element) {
            element.style.height = "auto";
            element.style.height = (element.scrollHeight) + "px";
        }

        function handleInputKeydown(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                submitUserQuery();
            }
        }

        function scrollToAbsoluteViewportBottom() {
            const viewport = document.getElementById("messages-viewport");
            viewport.scrollTo({
                top: viewport.scrollHeight,
                behavior: 'smooth'
            });
        }

        /**
         * Text Parsers Formatting Compilers Highlighters Components Core Architectures Layers Logic
         */
        function formatMarkdownContentPayload(rawContentMarkdownInputTelemetryString) {
            if (!rawContentMarkdownInputTelemetryString) return "";
            try {
                // Set options for high fidelity parsing compatibility mappings configuration
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: false,
                    mangle: false
                });
                
                let rawCompiledHTMLOutputString = marked.parse(rawContentMarkdownInputTelemetryString);
                
                // Post-process compiled elements blocks to structure execution styling wrappers around standard raw elements sequences arrays parameters code segments
                return rawCompiledHTMLOutputString;
            } catch (compilerMarkdownParsingFaultExceptionError) {
                return escapeHtmlEntities(rawContentMarkdownInputTelemetryString);
            }
        }

        function bindCodeBlockUtilityHeaders(parentElementNodeTreeScopeTarget) {
            // Locate each rendered block structure securely
            const structuralPreElementNodesCollection = parentElementNodeTreeScopeTarget.querySelectorAll("pre");
            
            structuralPreElementNodesCollection.forEach(preNodeElementBlock => {
                // Verify wrapper bindings parameters blocks maps to prevent duplicating headers
                if (preNodeElementBlock.parentElement.classList.contains('code-block-wrapper-container')) return;

                const codeElementNode = preNodeElementBlock.querySelector("code");
                let discoveredDetectedLanguageString = "code";

                if (codeElementNode) {
                    // Extract execution context language definitions from class structures mappings configurations sequences parameters
                    const matchingClassLanguageSignatureRegexArray = Array.from(codeElementNode.classList).find(c => c.startsWith("language-"));
                    if (matchingClassLanguageSignatureRegexArray) {
                        discoveredDetectedLanguageString = matchingClassLanguageSignatureRegexArray.replace("language-", "");
                    }
                    
                    // Trigger Prism.js engine context parameters compiler over internal markup elements scopes blocks maps
                    Prism.highlightElement(codeElementNode);
                }

                // Construct semantic outer encapsulation layout blocks layers nodes structure components elements mappings arrays configurations
                const coreWrapperNodeContainerFrame = document.createElement("div");
                coreWrapperNodeContainerFrame.className = "code-block-wrapper-container my-4 rounded-xl overflow-hidden border border-slate-200 dark:border-zinc-800 shadow-sm";
                
                const codeHeaderUtilityMenuBarElement = document.createElement("div");
                codeHeaderUtilityMenuBarElement.className = "bg-zinc-900 px-4 py-2 flex items-center justify-between text-xs font-mono text-zinc-400 select-none border-b border-zinc-800/60";
                codeHeaderUtilityMenuBarElement.innerHTML = `
                    <span class="font-semibold uppercase tracking-wider text-zinc-500">${discoveredDetectedLanguageString}</span>
                    <button onclick="executeClipboardCopySequenceAction(this)" class="flex items-center gap-1.5 hover:text-white transition-colors duration-150 py-0.5 px-2 rounded hover:bg-zinc-800">
                        <i class="fa-regular fa-copy"></i>
                        <span>Copy</span>
                    </button>
                `;

                // Remap operational tree pointers elements nodes contexts frameworks safely inside document fragment layouts components parameters
                preNodeElementBlock.parentNode.insertBefore(coreWrapperNodeContainerFrame, preNodeElementBlock);
                coreWrapperNodeContainerFrame.appendChild(codeHeaderUtilityMenuBarElement);
                coreWrapperNodeContainerFrame.appendChild(preNodeElementBlock);
                
                // Strip styling anomalies forced onto pre scopes directly to enable seamless parent edge bindings properties
                preNodeElementBlock.style.margin = "0";
                preNodeElementBlock.style.borderRadius = "0";
            });
        }

        async function executeClipboardCopySequenceAction(buttonClickElementTriggerTargetPointer) {
            const parentBlockWrapperScope = buttonClickElementTriggerTargetPointer.closest('.code-block-wrapper-container');
            if (!parentBlockWrapperScope) return;

            const codeBodyDataTargetNode = parentBlockWrapperScope.querySelector('pre code');
            if (!codeBodyDataTargetNode) return;

            try {
                const extractRawCodeTextTelemetryDataContentPayload = codeBodyDataTargetNode.innerText;
                await navigator.clipboard.writeText(extractRawCodeTextTelemetryDataContentPayload);

                // Update configuration interface aesthetics feedback elements tags loop arrays maps transitions systems state indicators safely
                const innerLabelElementSpan = buttonClickElementTriggerTargetPointer.querySelector('span');
                const innerIconButtonElement = buttonClickElementTriggerTargetPointer.querySelector('i');

                innerLabelElementSpan.innerText = "Copied!";
                innerIconButtonElement.className = "fa-solid fa-check text-emerald-400";
                buttonClickElementTriggerTargetPointer.classList.add("text-emerald-400");

                setTimeout(() => {
                    innerLabelElementSpan.innerText = "Copy";
                    innerIconButtonElement.className = "fa-regular fa-copy";
                    buttonClickElementTriggerTargetPointer.classList.remove("text-emerald-400");
                }, 2000);

            } catch (clipboardFaultException) {
                renderSystemToastAlert("System clipboard security subsystem interaction clearance failure.", "warn");
            }
        }

        /**
         * Application Interface Architecture Visual Presentation Themes Controls Systems Handlers
         */
        function toggleTheme() {
            appState.theme = appState.theme === "dark" ? "light" : "dark";
            synchronizeStateToLocalStorage();
            applyEnforcedThemeState(appState.theme);
        }

        function applyEnforcedThemeState(targetThemeConfigurationString) {
            const themeIconButton = document.getElementById("theme-icon");
            const themeLabelSpanText = document.getElementById("theme-text");
            const documentHtmlRootNode = document.documentElement;

            if (targetThemeConfigurationString === "dark") {
                documentHtmlRootNode.classList.add("dark");
                themeIconButton.className = "fa-solid fa-sun";
                themeLabelSpanText.innerText = "Light Mode";
            } else {
                documentHtmlRootNode.classList.remove("dark");
                themeIconButton.className = "fa-solid fa-moon";
                themeLabelSpanText.innerText = "Dark Mode";
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const backdrop = document.getElementById("sidebar-backdrop");

            if (sidebar.classList.contains("-translate-x-full")) {
                sidebar.classList.remove("-translate-x-full");
                backdrop.classList.remove("hidden");
            } else {
                sidebar.classList.add("-translate-x-full");
                backdrop.classList.add("hidden");
            }
        }

        /**
         * Structural Components Control Logic: Configuration Management Screens Layer Windows Modals
         */
        function openSettings() {
            document.getElementById("settings-api-key").value = appState.apiKey;
            document.getElementById("settings-model").value = appState.modelName;
            document.getElementById("settings-system-prompt").value = appState.globalSystemPrompt;

            const modalNode = document.getElementById("settings-modal");
            modalNode.classList.remove("hidden");
            setTimeout(() => {
                modalNode.querySelector('.transform').classList.remove('scale-95');
                modalNode.querySelector('.transform').classList.add('scale-100');
            }, 10);
        }

        function closeSettings() {
            const modalNode = document.getElementById("settings-modal");
            modalNode.querySelector('.transform').classList.remove('scale-100');
            modalNode.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modalNode.classList.add("hidden");
            }, 150);
        }

        function saveSettingsConfig() {
            const targetProposedKeyString = document.getElementById("settings-api-key").value.trim();
            const targetProposedModelString = document.getElementById("settings-model").value.trim();
            const targetProposedSystemString = document.getElementById("settings-system-prompt").value.trim();

            appState.apiKey = targetProposedKeyString;
            appState.modelName = targetProposedModelString !== "" ? targetProposedModelString : DEFAULT_MODEL;
            appState.globalSystemPrompt = targetProposedSystemString;

            // Retroactively update configuration details structures mapping nodes inside active selected chat parameters if unfilled arrays match
            const activeChatNodeContainerMappingNode = appState.chats.find(c => c.id === appState.activeChatId);
            if (activeChatNodeContainerMappingNode && activeChatNodeContainerMappingNode.messages.length === 0) {
                activeChatNodeContainerMappingNode.systemPromptOverride = appState.globalSystemPrompt;
            }

            synchronizeStateToLocalStorage();
            updateApplicationStatusBadges();
            closeSettings();
            renderSystemToastAlert("Engine configuration profile states updated successfully.", "success");
        }

        function togglePasswordVisibility(targetFieldElementIdentifierString, buttonElementContextContextTriggerPointer) {
            const targetedInputFieldNode = document.getElementById(targetFieldElementIdentifierString);
            const iconNodeElement = buttonElementContextContextTriggerPointer.querySelector('i');
            
            if (targetedInputFieldNode.type === "password") {
                targetedInputFieldNode.type = "text";
                iconNodeElement.className = "fa-solid fa-eye-slash";
            } else {
                targetedInputFieldNode.type = "password";
                iconNodeElement.className = "fa-solid fa-eye";
            }
        }

        /**
         * Global System Notifications Framework Toast Component Utilities Engine
         */
        function renderSystemToastAlert(messageTextPayloadTelemetryString, severityClassificationLevelKeyString = "success") {
            const toastContainerBoxWrapper = document.getElementById("toast-container");
            const atomicToastNotificationBoxNode = document.createElement("div");
            
            atomicToastNotificationBoxNode.className = "flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border text-sm font-medium transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto min-w-[280px] max-w-md bg-white dark:bg-zinc-950";

            let structuralSeverityIconHTMLMarkupTemplate = "";
            if (severityClassificationLevelKeyString === "success") {
                atomicToastNotificationBoxNode.classList.add("border-emerald-200", "dark:border-emerald-900/40");
                structuralSeverityIconHTMLMarkupTemplate = `<i class="fa-solid fa-circle-check text-emerald-500 text-base"></i>`;
            } else if (severityClassificationLevelKeyString === "error") {
                atomicToastNotificationBoxNode.classList.add("border-rose-200", "dark:border-rose-900/40");
                structuralSeverityIconHTMLMarkupTemplate = `<i class="fa-solid fa-circle-exclamation text-rose-500 text-base"></i>`;
            } else if (severityClassificationLevelKeyString === "warn") {
                atomicToastNotificationBoxNode.classList.add("border-amber-200", "dark:border-amber-900/40");
                structuralSeverityIconHTMLMarkupTemplate = `<i class="fa-solid fa-triangle-exclamation text-amber-500 text-base"></i>`;
            } else {
                atomicToastNotificationBoxNode.classList.add("border-slate-200", "dark:border-zinc-800");
                structuralSeverityIconHTMLMarkupTemplate = `<i class="fa-solid fa-circle-info text-blue-500 text-base"></i>`;
            }

            atomicToastNotificationBoxNode.innerHTML = `
                ${structuralSeverityIconHTMLMarkupTemplate}
                <div class="flex-1 text-slate-700 dark:text-zinc-200 break-words leading-tight">${escapeHtmlEntities(messageTextPayloadTelemetryString)}</div>
            `;

            toastContainerBoxWrapper.appendChild(atomicToastNotificationBoxNode);

            // Micro-task timeout initialization trigger animations sequence transitions effects properties adjustments nodes
            setTimeout(() => {
                atomicToastNotificationBoxNode.classList.remove("translate-y-2", "opacity-0");
            }, 10);

            // Program cleanup destruction workflows sequences configurations metrics rules loops arrays parameters maps definitions execution functions
            setTimeout(() => {
                atomicToastNotificationBoxNode.classList.add("opacity-0", "-translate-y-1");
                setTimeout(() => {
                    atomicToastNotificationBoxNode.remove();
                }, 300);
            }, 4000);
        }

        /**
         * Security Context Sanitization Escaper Utility Engine Components
         */
        function escapeHtmlEntities(textValueRawSourceStringString) {
            if (!textValueRawSourceStringString) return "";
            return textValueRawSourceStringString
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
